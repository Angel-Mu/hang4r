<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    hang4r app icon: a hang4r arch with an agent (terminal caret) live inside.
    The green block is the cursor — the agent is running.
    Transparent outside the squircle (no white dock background).
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1c2a"/>
      <stop offset="1" stop-color="#0d0d13"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#9a9aff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#9a9aff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect x="48" y="48" width="928" height="928" rx="210" fill="url(#bg)"/>
  <rect x="48" y="48" width="928" height="928" rx="210" fill="url(#glow)"/>
  <!-- hang4r arch -->
  <path d="M 296 752 L 296 512 A 216 216 0 0 1 728 512 L 728 752"
        fill="none" stroke="#7d7df0" stroke-width="74" stroke-linecap="round"/>
  <!-- agent caret, glowing -->
  <path d="M 424 548 L 518 628 L 424 708" fill="none" stroke="#dcdcff" stroke-width="60"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)" opacity="0.55"/>
  <path d="M 424 548 L 518 628 L 424 708" fill="none" stroke="#e8e8ff" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- live cursor block -->
  <rect x="566" y="660" width="64" height="48" rx="10" fill="#50fa7b"/>
</svg>
